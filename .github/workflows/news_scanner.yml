name: News Scanner

on:
  schedule:
    # 8:55 AM IST → Schedule 8 hours early (previous day 8:55 PM UTC)
    - cron: '55 20 * * 0-4'
    # 9:55 AM IST
    - cron: '55 21 * * 0-4'
    # 10:55 AM IST
    - cron: '55 22 * * 0-4'
    # 11:55 AM IST
    - cron: '55 23 * * 0-4'
    # 12:55 PM IST
    - cron: '55 0 * * 1-5'
    # 1:55 PM IST
    - cron: '55 1 * * 1-5'
    # 2:55 PM IST
    - cron: '55 2 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install packages
        run: pip install nsetools requests
      - name: Scan News
        env:
          TELEGRAM_NEWS_BOT_TOKEN: ${{ secrets.TELEGRAM_NEWS_BOT_TOKEN }}
          TELEGRAM_NEWS_CHAT_ID: ${{ secrets.TELEGRAM_NEWS_CHAT_ID }}
          TZ: Asia/Kolkata
        run: python news_scanner.py
